<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Stable Diffusion</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <script>
      var tvmjsGlobalEnv = tvmjsGlobalEnv || {};
    </script>
    <div id="root"></div>
    <div id="modal-root"></div>
    <script src="https://websd.mlc.ai/dist/tvmjs.bundle.js"></script>
    <script type="module">
      import init, { TokenizerWasm } from "https://websd.mlc.ai/dist/tokenizers-wasm/tokenizers_wasm.js";

      let initialized = false;
      async function getTokenizer(name) {
        if (!initialized) {
          await init();
          initialized = true;
        }
        const response = await fetch(`https://huggingface.co/${name}/raw/main/tokenizer.json`);
        const jsonText = await response.text();
        return new TokenizerWasm(jsonText);
      }

      tvmjsGlobalEnv.getTokenizer = getTokenizer;
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="stable_diffusion.js"></script>
    <script type="text/babel" data-type="module" data-presets="env,react" src="app.jsx"></script>
  </body>
</html>
