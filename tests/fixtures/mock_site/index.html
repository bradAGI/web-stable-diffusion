<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Mock Stable Diffusion</title>
    <script>
      var tvmjsGlobalEnv = tvmjsGlobalEnv || {};
    </script>
    <script type="module">
      import init, { TokenizerWasm } from "./dist/tokenizers-wasm/tokenizers_wasm.js";

      let initialized = false;
      async function getTokenizer(name) {
    if (!initialized) {
      await init();
      initialized = true;
    }
    const response = await fetch(
      `https://huggingface.co/${name}/raw/main/tokenizer.json`
    );
    const jsonText = await response.text();
    return new TokenizerWasm(jsonText);
  }

  const globalEnv = window.tvmjsGlobalEnv || {};
  window.tvmjsGlobalEnv = globalEnv;
  globalEnv.getTokenizer = getTokenizer;
  window.__tokenizerReady = true;
    </script>
    <script src="dist/stable_diffusion.js"></script>
  </head>
  <body>
    <div>
      Select Model:
      <select name="model" id="modelId">
        <option selected="selected">Stable-Diffusion-XL</option>
        <option>Stable-Diffusion-1.5</option>
      </select>
    </div>
    <div>
      Input prompt:
      <input
        name="inputPrompt"
        id="inputPrompt"
        type="text"
        value="A photo of an astronaut riding a horse on mars"
      />
      <br />
      Negative prompt (optional):
      <input name="negativePrompt" id="negativePrompt" type="text" value="" />
    </div>
    <div>
      Select scheduler -
      <select name="scheduler" id="schedulerId">
        <option value="0">Multi-step DPM Solver (20 steps)</option>
        <option value="1">PNDM (50 steps)</option>
        <option value="2">Euler Discrete Scheduler</option>
      </select>
      <br />
      Render intermediate steps -
      <select name="vae-cycle" id="vaeCycle">
        <option value="-1">No</option>
        <option value="2">Run VAE every two UNet steps after step 10</option>
      </select>
    </div>
    <div id="progress">
      <label id="gpu-tracker-label"></label><br />
      <label id="progress-tracker-label"></label><br />
      <progress
        id="progress-tracker-progress"
        max="100"
        value="0"
        role="progressbar"
        aria-live="polite"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="0"
      ></progress>
    </div>
    <div
      id="theme-controls"
      role="group"
      aria-label="Theme selection"
    >
      <button
        id="theme-light"
        data-theme-button
        data-theme="light"
        aria-pressed="true"
        type="button"
      >
        Light theme
      </button>
      <button
        id="theme-dark"
        data-theme-button
        data-theme="dark"
        aria-pressed="false"
        type="button"
      >
        Dark theme
      </button>
      <button
        id="theme-custom"
        data-theme-button
        data-theme="custom"
        aria-pressed="false"
        type="button"
      >
        Custom theme
      </button>
    </div>
    <button id="generate">Generate</button>
    <canvas
      id="canvas"
      width="512"
      height="512"
      role="img"
      aria-label="Generation preview"
    ></canvas>
    <div id="log" role="log" aria-live="polite" aria-atomic="false"></div>
  </body>
</html>
