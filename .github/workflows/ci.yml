name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r requirements.txt || echo "Base requirements failed to install; continuing with test-only deps"

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Run unit and integration tests
        run: |
          pytest --cov=web_stable_diffusion --cov-report=xml --cov-report=term-missing

      - name: Run JavaScript unit tests
        run: |
          npm ci
          npm test

      - name: GPU fallback check
        run: |
          if command -v nvidia-smi >/dev/null 2>&1; then
            echo "GPU detected; rerunning focused tests"
            pytest tests/unit -m "not playwright"
          else
            echo "No GPU detected; skipping GPU-specific checks"
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
